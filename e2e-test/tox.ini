[tox]
min_version=4
envlist =
    py311-spark334-java17
    py312-spark{334, 344}-java17
    py312-spark358-java17-extraspark344
    py313-spark{358, 402, 411}-java17
skipsdist = True

[testenv]
deps =
    pytest==8.2.1
    pytest-timeout==2.3.1
    requests==2.32.2
    unittest2==1.1.0
    ytsaurus-client==0.13.42
    ytsaurus-yson==0.4.9

    # These dependencies are required by Spark Connect
    pandas==2.2.3
    grpcio==1.80.0
    grpcio-status==1.80.0
    protobuf==6.33.0
    zstandard==0.25.0

    py313: setuptools==80.9.0
    spark334: pyspark==3.3.4
    spark344: pyspark==3.4.4
    spark358: pyspark==3.5.8
    spark402: pyspark==4.0.2
    spark411: pyspark==4.1.1
commands =
    bash -c 'set -e; \
             export PROXY_PORT={env:PROXY_PORT}; \
             ln -sf {env:java_home}/bin/java {envbindir}/java; \
             pip uninstall -y ytsaurus-spyt; \
             pip install $(find ../spyt-package/build/wheel/dist/ -type f -name "*.whl"); \
             python -m tests.yt_patch --python-path {env:python_path} --proxy "localhost:{env:PROXY_PORT}" --java-home {env:java_home} || echo "Global conf patching failed"; \
             source spyt-env; \
             python -m pytest --durations=0 -s --timeout=90 {env:pytest_k_filter} {env:PYTHON_FILTER} {posargs:tests -v}'
allowlist_externals =
    bash
passenv =
    SPARK_VERSIONS
    PYTHON_FILTER
setenv =
    py311: python_path=python3.11
    py312: python_path=python3.12
    py313: python_path=python3.13
    java17: java_home=/opt/jdk17
    spark{334, 344}: pytest_k_filter=-k "not test_spyt_connect and not test_dyn_allocation and not test_metrics"
