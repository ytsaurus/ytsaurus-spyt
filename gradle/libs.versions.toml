# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/platforms.html#sub::toml-dependencies-format

[versions]
spark-compile = "4.2.0-preview4" # TODO: switch to 4.2.0 version when it will be released
spark-compile212 = "3.5.8"
ytsaurus-client = "1.2.15-SNAPSHOT"
circe = "0.12.3"
circe-yaml = "0.12.0"
jsonevent-layout = "1.7"
shapeless = "2.3.7"
sttp = "2.1.4"
jetty = "12.1.8"

scalacheck = "1.14.3"
scalatest = "3.2.19"
scalatestplus = "3.2.19.0"
mockito = "1.14.4"
junit-platform = "1.13.1"

[libraries]
spark-launcher = { module = "org.apache.spark:spark-launcher_2.13", version.ref = "spark-compile" }
spark-launcher212 = { module = "org.apache.spark:spark-launcher_2.12", version.ref = "spark-compile212" }
spark-connect = { module = "org.apache.spark:spark-connect_2.13", version.ref = "spark-compile" }
spark-connect212 = { module = "org.apache.spark:spark-connect_2.12", version.ref = "spark-compile212" }
ytsaurus-client = {module = "tech.ytsaurus:ytsaurus-client", version.ref = "ytsaurus-client"}

circe-core = {module = "io.circe:circe-core_2.13", version.ref = "circe" }
circe-generic = {module = "io.circe:circe-generic_2.13", version.ref = "circe" }
circe-parser = {module = "io.circe:circe-parser_2.13", version.ref = "circe" }
circe-yaml = {module = "io.circe:circe-yaml_2.13", version.ref = "circe-yaml" }
jsonevent-layout = { module = "net.logstash.log4j:jsonevent-layout", version.ref = "jsonevent-layout" }
shapeless = { module = "com.chuusai:shapeless_2.13", version.ref = "shapeless" }
sttp = {module = "com.softwaremill.sttp.client:core_2.13", version.ref = "sttp" }
jetty-servlet = {module = "org.eclipse.jetty.ee10:jetty-ee10-servlet", version.ref = "jetty" }

scalacheck = {module = "org.scalacheck:scalacheck_2.13", version.ref = "scalacheck" }
scalactic = {module = "org.scalactic:scalactic_2.13", version.ref = "scalatest" }
scalatest = {module = "org.scalatest:scalatest_2.13" , version.ref = "scalatest" }
scalatestcheck = {module = "org.scalatestplus:scalacheck-1-19_2.13", version.ref = "scalatestplus" }
mockito-scalatest = {module = "org.mockito:mockito-scala-scalatest_2.13", version.ref = "mockito" }
mockito = {module = "org.mockito:mockito-scala_2.13", version.ref = "mockito" }
scalatestplus-junit = {module = "org.scalatestplus:junit-5-13_2.13", version.ref = "scalatestplus" }
junit-platform-engine = {module = "org.junit.platform:junit-platform-engine", version.ref = "junit-platform" }
junit-platform-launcher = {module = "org.junit.platform:junit-platform-launcher", version.ref = "junit-platform" }

[bundles]
circe = ["circe-core", "circe-generic", "circe-parser", "circe-yaml"]
test = ["scalacheck", "scalactic", "scalatest", "scalatestcheck", "mockito-scalatest", "mockito", "scalatestplus-junit"]
junit-platform = ["junit-platform-engine", "junit-platform-launcher"]

[plugins]
scalatest = {id = "com.github.maiflai.scalatest", version = "0.33"}
