[versions]
scala-collection-compat = "2.7.0" # TODO: temporary dependency for backward compatibility before switching to scala 2.13 and Spark 4.x.x
spark-compile = "3.5.8"
ytsaurus-client = "1.2.14"
circe = "0.12.3"
circe-yaml = "0.12.0"
scalding = "0.17.4"
jsonevent-layout = "1.7"
shapeless = "2.3.7"
sttp = "2.1.4"

scalacheck = "1.14.3"
scalatest = "3.2.19"
scalatestplus = "3.2.19.0"
mockito = "1.14.4"
junit-platform = "1.13.1"

[libraries]
scala-collection-compat = { module = "org.scala-lang.modules:scala-collection-compat_2.12", version.ref = "scala-collection-compat" }

spark-launcher = { module = "org.apache.spark:spark-launcher_2.12", version.ref = "spark-compile" }
spark-connect = { module = "org.apache.spark:spark-connect_2.12", version.ref = "spark-compile" }
ytsaurus-client = {module = "tech.ytsaurus:ytsaurus-client", version.ref = "ytsaurus-client"}

circe-core = {module = "io.circe:circe-core_2.12", version.ref = "circe" }
circe-generic = {module = "io.circe:circe-generic_2.12", version.ref = "circe" }
circe-parser = {module = "io.circe:circe-parser_2.12", version.ref = "circe" }
circe-yaml = {module = "io.circe:circe-yaml_2.12", version.ref = "circe-yaml" }
scalding-args = {module = "com.twitter:scalding-args_2.12", version.ref = "scalding" }
jsonevent-layout = { module = "net.logstash.log4j:jsonevent-layout", version.ref = "jsonevent-layout" }
shapeless = { module = "com.chuusai:shapeless_2.12", version.ref = "shapeless" }
sttp = {module = "com.softwaremill.sttp.client:core_2.12", version.ref = "sttp" }

scalacheck = {module = "org.scalacheck:scalacheck_2.12", version.ref = "scalacheck" }
scalactic = {module = "org.scalactic:scalactic_2.12", version.ref = "scalatest" }
scalatest = {module = "org.scalatest:scalatest_2.12" , version.ref = "scalatest" }
scalatestcheck = {module = "org.scalatestplus:scalacheck-1-19_2.12", version.ref = "scalatestplus" }
mockito-scalatest = {module = "org.mockito:mockito-scala-scalatest_2.12", version.ref = "mockito" }
mockito = {module = "org.mockito:mockito-scala_2.12", version.ref = "mockito" }
junit-platform-engine = {module = "org.junit.platform:junit-platform-engine", version.ref = "junit-platform" }
junit-platform-launcher = {module = "org.junit.platform:junit-platform-launcher", version.ref = "junit-platform" }
scalatestplus-junit = {module = "org.scalatestplus:junit-5-13_2.12", version.ref = "scalatestplus" }

[bundles]
circe = ["circe-core", "circe-generic", "circe-parser", "circe-yaml"]
test = ["scalacheck", "scalactic", "scalatest", "scalatestcheck", "mockito-scalatest", "mockito"]
junit-platform = ["junit-platform-engine", "junit-platform-launcher", "scalatestplus-junit"]

[plugins]
scalatest = {id = "com.github.maiflai.scalatest", version = "0.33"}
